<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DENISIA PAY SYSTEM</title>
    <style>
        body { background: #000; color: #00eeff; font-family: 'Courier New', monospace; text-align: center; }
        .box { border: 2px solid #00eeff; padding: 30px; display: inline-block; margin-top: 50px; box-shadow: 0 0 20px #00eeff; }
        #apple { font-size: 100px; filter: grayscale(1); transition: 1s; margin: 20px; }
        .unlocked { filter: grayscale(0) !important; drop-shadow: 0 0 30px gold; }
        input { background: #111; border: 1px solid #00eeff; color: #00eeff; padding: 10px; width: 350px; margin: 10px 0; outline: none; }
        .btn { background: #00eeff; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; margin: 5px; text-decoration: none; display: inline-block; }
        #status { margin-top: 15px; font-weight: bold; }
        .step { color: #fff; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="box">
    <div id="apple">🍎</div>
    <h2 id="msg">СИСТЕМА DENISIA</h2>

    <div id="payment-ui">
        <p class="step">1. Вставь свой адрес кошелька (откуда будешь платить):</p>
        <input type="text" id="userWallet" placeholder="UQ... или EQ...">
        
        <p class="step">2. Нажми кнопку оплаты (3 USDT / 0.6 TON):</p>
        <a href="#" id="payLink" class="btn" onclick="openWallet()">ОПЛАТИТЬ ЧЕРЕЗ КОШЕЛЕК</a>
        
        <p class="step">3. После оплаты нажми здесь:</p>
        <button class="btn" onclick="verifyBlockchain()">ПРОВЕРИТЬ ОПЛАТУ</button>
    </div>

    <div id="status">ОЖИДАНИЕ ВВОДА...</div>
</div>

<script>
    const MY_ADDR = "UQB0HK2LubFblnzTNWjuchU0CtFjEfFrlRXO23YkwVKaoyHQ";
    const AMOUNT = "600000000"; // 0.6 TON (примерно 3 USDT)

    function openWallet() {
        const userAddr = document.getElementById('userWallet').value.trim();
        if(!userAddr) {
            alert("Сначала введи свой адрес!");
            return;
        }
        // Создаем прямую ссылку для кошелька
        const link = `ton://transfer/${MY_ADDR}?amount=${AMOUNT}&text=PAY-DENISIA`;
        window.location.href = link;
        document.getElementById('status').innerText = "ПЕРЕХОД В КОШЕЛЕК...";
    }

    async function verifyBlockchain() {
        const userAddr = document.getElementById('userWallet').value.trim();
        const statusDiv = document.getElementById('status');

        if(!userAddr) {
            alert("Введите ваш адрес!");
            return;
        }

        statusDiv.innerText = "СКАНИРУЮ БЛОКЧЕЙН...";
        statusDiv.style.color = "yellow";

        try {
            // Запрос к API блокчейна TON
            const response = await fetch(`https://toncenter.com/api/v2/getTransactions?address=${MY_ADDR}&limit=15`);
            const data = await response.json();

            if (data.ok) {
                const txs = data.result;
                let found = false;

                for (let tx of txs) {
                    // Проверяем: пришла ли транзакция от вписанного адреса
                    if (tx.in_msg && tx.in_msg.source.toLowerCase() === userAddr.toLowerCase()) {
                        found = true;
                        break;
                    }
                }

                if (found) {
                    unlockSuccess();
                } else {
                    statusDiv.innerText = "ТРАНЗАКЦИЯ НЕ НАЙДЕНА. ПОДОЖДИТЕ 30 СЕКУНД И ПОВТОРИТЕ.";
                    statusDiv.style.color = "red";
                }
            }
        } catch (e) {
            console.error(e);
            alert("Ошибка сети API. Попробуйте снова.");
        }
    }

    function unlockSuccess() {
        document.getElementById('apple').classList.add('unlocked');
        document.getElementById('msg').innerText = "ДОСТУП ОТКРЫТ!";
        document.getElementById('status').innerText = "ОПЛАТА ПОДТВЕРЖДЕНА!";
        document.getElementById('status').style.color = "#00ff00";
        document.getElementById('payment-ui').style.display = 'none';
        alert("Империя приветствует тебя! Яблоко разблокировано.");
    }
</script>

</body>
</html>
