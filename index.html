<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DENISIA OS | SECURE INSTALLER</title>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; cursor: crosshair; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #00BFFF; 
            font-family: 'Arial Black', sans-serif; overflow: hidden; 
        }

        /* Анимация звездного неба DENISIA */
        #universe {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #001a33 0%, #000 100%);
            z-index: -1;
        }

        .container {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; text-align: center;
        }

        .header {
            font-size: 50px; text-transform: uppercase; letter-spacing: 10px;
            text-shadow: 0 0 20px #00BFFF, 0 0 40px #00BFFF;
            margin-bottom: 20px; animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); }
        }

        .terminal {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #00BFFF;
            padding: 20px; width: 80%; max-width: 600px;
            box-shadow: 0 0 50px rgba(0, 191, 255, 0.3);
            border-radius: 10px; margin-bottom: 30px;
        }

        .status-text { font-size: 14px; color: #00BFFF; margin: 5px 0; text-align: left; }

        /* КНОПКА ПОДПИСИ */
        .btn-main {
            background: #000; color: #00BFFF; border: 3px solid #00BFFF;
            padding: 25px 50px; font-size: 24px; font-weight: bold;
            text-transform: uppercase; cursor: pointer; border-radius: 50px;
            box-shadow: 0 0 20px #00BFFF; transition: 0.3s; position: relative;
        }

        .btn-main:hover {
            background: #00BFFF; color: #000; box-shadow: 0 0 60px #00BFFF;
        }

        .btn-main:disabled {
            border-color: #555; color: #555; box-shadow: none; cursor: not-allowed;
        }

        .key-hidden { display: none; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="universe"></div>

    <div class="container">
        <div class="header">DENISIA PRO</div>
        
        <div class="terminal" id="term">
            <div class="status-text">> INITIALIZING SECURE PROTOCOL... DONE</div>
            <div class="status-text">> CHECKING SERVER SIGNATURE... <span id="sig">WAITING</span></div>
            <div class="status-text">> ENCRYPTING APK BLOCKS... 100%</div>
        </div>

        <button class="btn-main" id="signBtn" onclick="verifyAndDownload()">
            ПОДПИСАТЬ И УСТАНОВИТЬ APK
        </button>
    </div>

    <script>
        // --- СЕКРЕТНЫЙ БЛОК (ХРАНИТСЯ НА СЕРВЕРЕ) ---
        const SERVER_KEY = "DENISIA-999-SECRET-PRO-KEY"; // ОДИН РАЗ СКОПИРУЙ ЕГО СЮДА
        let isSigned = false;

        // БЛОКИРОВКА ПРОСМОТРА КОДА
        document.addEventListener('keydown', function(e) {
            if (e.key === "F12" || (e.ctrlKey && e.shiftKey && e.key === "I") || (e.ctrlKey && e.key === "U")) {
                e.preventDefault();
                alert("ACCESS DENIED BY DENISIA SECURITY");
            }
        });

        function verifyAndDownload() {
            const btn = document.getElementById('signBtn');
            const sig = document.getElementById('sig');
            
            btn.innerText = "ПОДПИСЫВАЮ...";
            btn.disabled = true;

            // Имитация проверки ключа на сервере
            setTimeout(() => {
                if (SERVER_KEY.includes("DENISIA")) {
                    sig.innerText = "VERIFIED";
                    sig.style.color = "#0f0";
                    
                    // СОЗДАНИЕ ССЫЛКИ НА СКРЫТЫЙ ФАЙЛ
                    const fileUrl = 'DENISIA Launcher (4).apk';
                    const a = document.createElement('a');
                    a.href = fileUrl;
                    a.download = 'DENISIA_Launcher_Signed.apk';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    btn.innerText = "ПОДПИСАНО И СКАЧАНО";
                    alert("КЛЮЧ ПРИНЯТ. УСТАНОВКА ЗАПУЩЕНА.");
                } else {
                    alert("ОШИБКА: КЛЮЧ НЕ НАЙДЕН НА СЕРВЕРЕ");
                    btn.disabled = false;
                    btn.innerText = "ПОПРОБОВАТЬ СНОВА";
                }
            }, 2000);
        }

        // Генерация звезд фона
        const univ = document.getElementById('universe');
        for(let i=0; i<80; i++) {
            const star = document.createElement('div');
            star.style.position = 'absolute';
            star.style.background = '#00BFFF';
            star.style.width = '2px';
            star.style.height = '2px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random();
            univ.appendChild(star);
        }
    </script>

</body>
</html>
