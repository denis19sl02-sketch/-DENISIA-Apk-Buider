<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DENISIA Cloud | Imperial Infrastructure</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        
        body { margin: 0; background: #000; color: #00d4ff; font-family: 'Orbitron', sans-serif; overflow: hidden; user-select: none; -webkit-user-select: none; }
        #canvas-container { position: fixed; top: 0; left: 0; z-index: -1; }
        
        #ui-layer { position: absolute; top: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .window { 
            background: rgba(0, 8, 15, 0.95); border: 2px solid #00d4ff; padding: 35px; 
            width: 450px; text-align: center; box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
            border-radius: 2px; position: relative;
        }

        h1 { font-size: 26px; letter-spacing: 8px; margin-bottom: 25px; text-shadow: 0 0 10px #00d4ff; }
        .btn { 
            width: 100%; padding: 15px; background: #00d4ff; color: #000; border: none; 
            font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.2s; font-family: 'Orbitron';
        }
        .btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        
        input { 
            width: 90%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #00d4ff; 
            color: #00d4ff; text-align: center; outline: none; font-family: 'Orbitron';
        }

        .server-box { 
            background: rgba(0,255,255,0.05); border: 1px dashed #00d4ff; 
            margin: 15px 0; padding: 15px; text-align: left; font-size: 11px;
        }

        .copy-btn { 
            background: #222; color: #00d4ff; border: 1px solid #00d4ff; 
            padding: 5px 10px; cursor: pointer; float: right; font-size: 10px;
        }

        #timer { font-size: 32px; color: #ff00ff; margin: 20px 0; text-shadow: 0 0 15px #ff00ff; }
        .hidden { display: none; }
        .loading-text { font-size: 12px; color: #555; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;" onkeydown="return false;">

<div id="canvas-container"></div>

<div id="ui-layer">
    <div id="scr-auth" class="window">
        <h1>DENISIA CLOUD</h1>
        <p class="loading-text" id="auth-msg">SCANNING DEVICE HARDWARE...</p>
        <div id="auth-form" class="hidden">
            <input type="text" id="reg-name" placeholder="FULL IMPERIAL NAME">
            <button class="btn" onclick="registerDevice()">INITIALIZE SYSTEM</button>
        </div>
    </div>

    <div id="scr-rent" class="window hidden">
        <h1>RENT CLUSTER</h1>
        <p style="font-size: 12px; color: #888;">2 Dedicated Nodes | Private Key | 7 Days</p>
        <div style="font-size: 24px; color: #00ff00; margin: 15px 0;">1.5 TON ($12)</div>
        <p style="font-size: 9px; word-break: break-all;">WALLET: UQB0HK2LubFblnzTNWjuchU0CtFjEfFrlRXO23YkwVKaoyHQ</p>
        <button class="btn" onclick="openTon()">OPEN WALLET</button>
        <button class="btn" style="background:#111; color:#00d4ff; border: 1px solid #00d4ff;" onclick="confirmPay()">CONFIRM PAYMENT</button>
    </div>

    <div id="scr-dash" class="window hidden">
        <h1>SYSTEM ACTIVE</h1>
        <div id="timer">00:00:00:00</div>
        <div id="details"></div>
        <p style="font-size: 10px; color: #444; margin-top: 15px;">Device recognized by Denisia Secure Protocol</p>
    </div>
</div>

<script>
    const MASTER_KEY = "$2a$10$NF86QybyNthy/LwCg9j8p.lqxDs96wRGqd.1MA95FZv3xLrU8HlYa";
    const DC_HUB = "69dd7066aaba882197f69b92";
    const LOG_DB = "69dd734036566621a8ad82a8";
    const WALLET = "UQB0HK2LubFblnzTNWjuchU0CtFjEfFrlRXO23YkwVKaoyHQ";

    let deviceID = "";
    let userData = null;

    // --- 3D ENGINE (SHARP D-CORE) ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // Stars
    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for(let i=0; i<4000; i++) starPos.push((Math.random()-0.5)*1000, (Math.random()-0.5)*1000, (Math.random()-0.5)*1000);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x00d4ff, size:0.5})));

    // Sharp Neon D
    const dPts = [];
    for(let i=-12; i<=12; i+=0.4) dPts.push(new THREE.Vector3(-6, i, 0)); // Line
    for(let i=-Math.PI/2; i<=Math.PI/2; i+=0.05) dPts.push(new THREE.Vector3(-6 + Math.cos(i)*11, Math.sin(i)*11, 0)); // Curve
    const dMesh = new THREE.Points(new THREE.BufferGeometry().setFromPoints(dPts), new THREE.PointsMaterial({color:0x00d4ff, size:0.25}));
    scene.add(dMesh);
    camera.position.z = 40;

    function animate() { requestAnimationFrame(animate); dMesh.rotation.y += 0.02; renderer.render(scene, camera); }
    animate();

    // --- LOGIC & SECURITY ---
    
    // 1. Generate Fingerprint (Hardware ID)
    function generateFingerprint() {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl');
        const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
        const renderer = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL);
        return btoa(renderer + screen.width + screen.height);
    }

    async function api(id, method='GET', body=null) {
        const r = await fetch(`https://api.jsonbin.io/v3/b/${id}`, {
            method, headers: {'X-Master-Key': MASTER_KEY, 'Content-Type': 'application/json'},
            body: body ? JSON.stringify(body) : null
        });
        return await r.json();
    }

    // Initialize
    window.onload = async () => {
        deviceID = generateFingerprint();
        const logs = await api(LOG_DB);
        userData = logs.record.users?.find(u => u.deviceID === deviceID);

        if (userData) {
            showDashboard();
        } else {
            document.getElementById('auth-msg').classList.add('hidden');
            document.getElementById('auth-form').classList.remove('hidden');
        }
    };

    async function registerDevice() {
        const name = document.getElementById('reg-name').value.trim();
        if(!name) return;
        
        const logs = await api(LOG_DB);
        if(logs.record.users?.some(u => u.name === name)) return alert("NAME TAKEN!");
        
        userData = { name, deviceID, cluster: null };
        document.getElementById('scr-auth').classList.add('hidden');
        document.getElementById('scr-rent').classList.remove('hidden');
    }

    function openTon() { window.location.href = `ton://transfer/${WALLET}?amount=1500000000&text=DENISIA_CLOUD_${userData.name}`; }

    async function confirmPay() {
        // 1. Find Cluster in DC
        const hub = await api(DC_HUB);
        const clusterId = Object.keys(hub.record.CLUSTERS).find(k => !hub.record.CLUSTERS[k].current_owner);
        if(!clusterId) return alert("NO FREE NODES!");

        const expires = Date.now() + 604800000;
        const clusterData = hub.record.CLUSTERS[clusterId];

        // 2. Lock in DC
        hub.record.CLUSTERS[clusterId].current_owner = userData.name;
        hub.record.CLUSTERS[clusterId].control.is_locked = false;
        await api(DC_HUB, 'PUT', hub.record);

        // 3. Save to Logs with DeviceID
        const logs = await api(LOG_DB);
        if(!logs.record.users) logs.record.users = [];
        userData = { 
            ...userData, 
            cluster: clusterId, 
            expires, 
            nodes: clusterData.nodes, 
            key: clusterData.access_key,
            wallet_sent: WALLET
        };
        logs.record.users.push(userData);
        await api(LOG_DB, 'PUT', logs.record);

        showDashboard();
    }

    function copy(text) {
        navigator.clipboard.writeText(text);
        alert("Copied to Imperial Clipboard");
    }

    function showDashboard() {
        document.querySelectorAll('.window').forEach(w => w.classList.add('hidden'));
        document.getElementById('scr-dash').classList.remove('hidden');
        
        document.getElementById('details').innerHTML = `
            <div class="server-box">
                <button class="copy-btn" onclick="copy('${userData.nodes[0]}')">COPY</button>
                NODE 1: ${userData.nodes[0]}
            </div>
            <div class="server-box">
                <button class="copy-btn" onclick="copy('${userData.nodes[1]}')">COPY</button>
                NODE 2: ${userData.nodes[1]}
            </div>
            <div class="server-box">
                <button class="copy-btn" onclick="copy('${userData.key}')">COPY</button>
                ACCESS KEY: ${userData.key}
            </div>
        `;

        setInterval(() => {
            const diff = userData.expires - Date.now();
            if(diff <= 0) {
                document.getElementById('timer').innerText = "EXPIRED";
                document.getElementById('timer').style.color = "red";
                return;
            }
            const d = Math.floor(diff/86400000), h = Math.floor((diff%86400000)/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
            document.getElementById('timer').innerText = `${d}d ${h}:${m}:${s}`;
        }, 1000);
    }

    // Protection from DevTools
    document.onkeydown = (e) => {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
</script>
</body>
</html>
