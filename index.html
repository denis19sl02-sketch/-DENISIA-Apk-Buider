<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DENISIA PAY SYSTEM</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background: #000; color: #00eeff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .container { border: 2px solid #00eeff; display: inline-block; padding: 40px; box-shadow: 0 0 20px #00eeff; }
        #apple { font-size: 120px; filter: grayscale(1); transition: 1.5s; margin-bottom: 20px; }
        .unlocked { filter: grayscale(0) !important; drop-shadow: 0 0 30px #00eeff; }
        #ton-connect-btn { display: flex; justify-content: center; margin: 20px 0; }
        .pay-btn { 
            background: #00eeff; color: #000; border: none; padding: 15px 40px; 
            font-size: 18px; font-weight: bold; cursor: pointer; display: none; 
        }
        .pay-btn:hover { background: #fff; }
    </style>
</head>
<body>

<div class="container">
    <div id="apple">🍎</div>
    <h2 id="msg">ЯБЛОКО ЗАБЛОКИРОВАНО</h2>
    
    <div id="ton-connect-btn"></div>

    <button id="main-pay-btn" class="pay-btn" onclick="startPay()">ОПЛАТИТЬ 3 USDT</button>
</div>

<script>
    // Инициализация. Используем стабильный манифест.
    const tc = new TON_CONNECT_UI.TonConnectUI({
        manifestUrl: 'https://ton-connect.github.io/demo-dapp-with-react/tonconnect-manifest.json',
        buttonRootId: 'ton-connect-btn'
    });

    const payBtn = document.getElementById('main-pay-btn');
    const myWallet = "UQB0HK2LubFblnzTNWjuchU0CtFjEfFrlRXO23YkwVKaoyHQ";

    // Проверка: подключился ли юзер
    tc.onStatusChange(wallet => {
        if (wallet) {
            payBtn.style.display = 'inline-block';
            document.getElementById('msg').innerText = "КОШЕЛЕК ГОТОВ";
        } else {
            payBtn.style.display = 'none';
            document.getElementById('msg').innerText = "ПОДКЛЮЧИТЕ КОШЕЛЕК";
        }
    });

    async function startPay() {
        // 0.6 TON примерно равно 3 USDT (курс меняется, но для теста пойдет)
        const tx = {
            validUntil: Math.floor(Date.now() / 1000) + 360,
            messages: [
                {
                    address: myWallet,
                    amount: "600000000", // Нано-TONы
                }
            ]
        };

        try {
            const result = await tc.sendTransaction(tx);
            if (result) {
                // Если транзакция прошла успешно
                document.getElementById('apple').classList.add('unlocked');
                document.getElementById('msg').innerText = "ОПЛАЧЕНО! ДОСТУП ОТКРЫТ";
                document.getElementById('msg').style.color = "#00ff00";
                payBtn.style.display = 'none';
                alert("Успешно! Деньги отправлены на твой кошелек.");
            }
        } catch (e) {
            alert("Ошибка оплаты: " + e.message);
        }
    }
</script>

</body>
</html>
