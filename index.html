<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENISIA APK CONSOLE v5.0</title>
    <style>
        body { background: #000; color: #00eaff; font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 20px; }
        .box { width: 100%; max-width: 800px; border: 4px solid #00eaff; padding: 30px; box-shadow: 0 0 30px #00eaff; background: #050505; border-radius: 20px; }
        h1 { text-align: center; text-shadow: 0 0 15px #00eaff; letter-spacing: 5px; margin-bottom: 30px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #fff; }
        input, textarea { width: 100%; background: #111; border: 1px solid #00eaff; color: #0f0; padding: 15px; box-sizing: border-box; font-size: 1.1em; outline: none; }
        input:focus, textarea:focus { box-shadow: 0 0 10px #00eaff; }
        .btn-build { width: 100%; background: #00eaff; color: #000; border: none; padding: 25px; font-weight: bold; font-size: 1.5em; cursor: pointer; margin-top: 30px; transition: 0.3s; text-transform: uppercase; }
        .btn-build:hover { background: #fff; box-shadow: 0 0 40px #fff; transform: scale(1.02); }
        #status { margin-top: 25px; padding: 15px; border-top: 2px dashed #333; text-align: center; font-size: 1.2em; color: #ff00ff; }
        .info { color: #888; font-size: 0.8em; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h1>DENISIA APK OS</h1>
    
    <label>ИМЯ ПРИЛОЖЕНИЯ (NAME):</label>
    <input type="text" id="appName" placeholder="Напр: DENISIA_GAME">

    <label>HTML / JS / CSS КОД:</label>
    <textarea id="appCode" rows="15" placeholder="Вставь сюда полный код своего приложения..."></textarea>

    <button class="btn-build" onclick="triggerFullBuild()">Собрать APK (Real Build)</button>
    
    <div id="status">СИСТЕМА ОЖИДАНИЯ КОМАНДЫ</div>
    <div class="info">Данные уходят на сервер: 69d0c72936566621a87a4ee9</div>
</div>

<script>
    // --- ТВОИ НАСТРОЙКИ GITHUB ---
    const TOKEN = "ВСТАВЬ_СВОЙ_ТОКЕН_GHP_СЮДА"; 
    const USER = "ТВОЙ_ЛОГИН_GITHUB";
    const REPO = "DenisiaBuilder";
    
    // --- НАСТРОЙКИ СЕРВЕРА ---
    const BIN_ID = "69d0c72936566621a87a4ee9";
    const BIN_KEY = "$2a$10$piBi/4TcAsEwd6rVS6q7/OeIoKMgU9X6ygr6GEpmvK/M5dDBQ/I8y";

    async function triggerFullBuild() {
        const status = document.getElementById('status');
        const name = document.getElementById('appName').value;
        const code = document.getElementById('appCode').value;

        if (!name || !code) {
            alert("ОШИБКА: Заполни имя и код!");
            return;
        }

        status.style.color = "yellow";
        status.innerText = "● ШАГ 1: ЗАПИСЬ В ОБЛАКО...";

        try {
            // 1. Обновляем JSONbin
            const resBin = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json', 
                    'X-Master-Key': BIN_KEY 
                },
                body: JSON.stringify({ 
                    appName: name, 
                    html: code, 
                    buildTime: new Date().toLocaleString() 
                })
            });

            if (!resBin.ok) throw new Error("Ошибка сервера данных");

            status.innerText = "● ШАГ 2: ЗАПУСК ЗАВОДА GITHUB...";

            // 2. Запускаем GitHub Action
            const resGH = await fetch(`https://api.github.com/repos/${USER}/${REPO}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `token ${TOKEN}`,
                    'Accept': 'application/vnd.github.v3+json'
                },
                body: JSON.stringify({ event_type: "build_event" })
            });

            if (resGH.ok) {
                status.style.color = "lime";
                status.innerHTML = "ГОТОВО! ЗАВОД ЗАПУЩЕН.<br>Жди файл в GitHub Actions (3-5 мин)";
            } else {
                throw new Error("Ошибка GitHub (Проверь Токен)");
            }

        } catch (err) {
            status.style.color = "red";
            status.innerText = "КРИТИЧЕСКАЯ ОШИБКА: " + err.message;
        }
    }
</script>

</body>
</html>
