<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DENISIA REALTIME BLOCKCHAIN</title>
    <style>
        body { background: #000; color: #00eeff; font-family: 'Courier New', monospace; text-align: center; }
        .box { border: 2px solid #00eeff; padding: 30px; display: inline-block; margin-top: 50px; box-shadow: 0 0 20px #00eeff; }
        #apple { font-size: 100px; filter: grayscale(1); transition: 1s; margin: 20px; }
        .unlocked { filter: grayscale(0) !important; drop-shadow: 0 0 30px gold; }
        
        input { background: #111; border: 1px solid #00eeff; color: #00eeff; padding: 12px; width: 380px; margin: 10px 0; font-size: 14px; }
        .balance-info { font-size: 20px; margin: 15px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .btn { background: #00eeff; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; text-decoration: none; display: inline-block; margin: 5px; }
        
        #status { margin-top: 15px; color: #888; }
        .ton-symbol { color: #00eeff; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <div id="apple">🍎</div>
    <h2 id="msg">СИСТЕМА DENISIA</h2>

    <div class="balance-info">
        БАЛАНС: <span id="user-balance">0.00</span> <span class="ton-symbol">TON</span>
    </div>

    <div id="payment-ui">
        <p>Вставь адрес своего кошелька:</p>
        <input type="text" id="userWallet" placeholder="Введите адрес (UQ...)" oninput="updateBalance()">
        
        <br><br>
        <a href="#" class="btn" onclick="pay()">ОПЛАТИТЬ 3 USDT</a>
        <button class="btn" onclick="verify()">ПРОВЕРИТЬ ОПЛАТУ</button>
    </div>

    <div id="status">ВВЕДИТЕ АДРЕС ДЛЯ СИНХРОНИЗАЦИИ...</div>
</div>

<script>
    const MY_ADDR = "UQB0HK2LubFblnzTNWjuchU0CtFjEfFrlRXO23YkwVKaoyHQ";
    const AMOUNT = "600000000"; // ~3 USDT

    // ФУНКЦИЯ ПОЛУЧЕНИЯ РЕАЛЬНОГО БАЛАНСА
    async function updateBalance() {
        const addr = document.getElementById('userWallet').value.trim();
        const balanceDisplay = document.getElementById('user-balance');
        const status = document.getElementById('status');

        if (addr.length < 40) return; // Ждем пока адрес будет введен полностью

        try {
            status.innerText = "СЧИТЫВАНИЕ БАЛАНСА...";
            const response = await fetch(`https://toncenter.com/api/v2/getAddressInformation?address=${addr}`);
            const data = await response.json();

            if (data.ok) {
                // Баланс приходит в нанотонах, делим на 10 в 9 степени
                const nanoBalance = data.result.balance;
                const realBalance = (nanoBalance / 1000000000).toFixed(2);
                
                balanceDisplay.innerText = realBalance;
                status.innerText = "КОШЕЛЕК СИНХРОНИЗИРОВАН";
                status.style.color = "#00ff00";
            } else {
                status.innerText = "ОШИБКА: НЕВЕРНЫЙ АДРЕС";
                status.style.color = "red";
            }
        } catch (e) {
            console.error(e);
        }
    }

    function pay() {
        const addr = document.getElementById('userWallet').value.trim();
        if (!addr) { alert("Сначала введи адрес!"); return; }
        window.location.href = `ton://transfer/${MY_ADDR}?amount=${AMOUNT}&text=PAY-DENISIA`;
    }

    async function verify() {
        const addr = document.getElementById('userWallet').value.trim();
        if (!addr) return;
        
        document.getElementById('status').innerText = "ПОИСК ТРАНЗАКЦИИ В БЛОКЧЕЙНЕ...";
        
        try {
            const response = await fetch(`https://toncenter.com/api/v2/getTransactions?address=${MY_ADDR}&limit=10`);
            const data = await response.json();
            
            let found = false;
            data.result.forEach(tx => {
                if (tx.in_msg && tx.in_msg.source.toLowerCase() === addr.toLowerCase()) {
                    found = true;
                }
            });

            if (found) {
                document.getElementById('apple').classList.add('unlocked');
                document.getElementById('msg').innerText = "ДОСТУП ОТКРЫТ!";
                document.getElementById('status').innerText = "ОПЛАТА ПОДТВЕРЖДЕНА";
                document.getElementById('payment-ui').style.display = "none";
            } else {
                alert("Оплата не найдена. Подождите 30 секунд после перевода.");
            }
        } catch (e) {
            alert("Ошибка API");
        }
    }
</script>

</body>
</html>
