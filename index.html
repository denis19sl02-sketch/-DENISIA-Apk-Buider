<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DENISIA OS: REAL APK SYSTEM</title>
    <style>
        :root { --neon: #00e5ff; --bg: #000; --panel: rgba(0, 20, 40, 0.9); }
        
        body { 
            margin: 0; background: var(--bg); color: var(--neon); 
            font-family: 'Arial Black', sans-serif; overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center; padding-bottom: 50px;
        }

        h1 { text-shadow: 0 0 15px var(--neon); letter-spacing: 3px; text-transform: uppercase; margin: 30px 0 10px; }

        .container { 
            width: 90%; max-width: 600px; background: var(--panel); 
            border: 2px solid var(--neon); padding: 25px; border-radius: 20px; 
            box-shadow: 0 0 25px rgba(0, 229, 255, 0.2); margin-top: 20px;
        }

        label { display: block; margin: 15px 0 5px; font-size: 14px; opacity: 0.8; }

        input, textarea { 
            width: 100%; background: #050505; border: 1px solid var(--neon); 
            color: #fff; padding: 12px; border-radius: 10px; box-sizing: border-box; 
            font-family: monospace; outline: none;
        }

        textarea { height: 150px; resize: none; border-left: 5px solid var(--neon); }

        button { 
            width: 100%; padding: 18px; background: var(--neon); border: none; 
            color: #000; font-weight: bold; border-radius: 12px; cursor: pointer; 
            font-size: 18px; margin-top: 20px; text-transform: uppercase; transition: 0.3s;
        }

        button:hover { box-shadow: 0 0 30px var(--neon); transform: scale(1.02); }

        /* ЗОНА УСТАНОВКИ */
        .installer-zone { border: 2px dashed #ff0055; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3); color: #ff0055; }
        .installer-zone h1 { color: #ff0055; text-shadow: 0 0 15px #ff0055; }
        .installer-zone input[type="file"] { border-color: #ff0055; color: #ff0055; }

        /* СИСТЕМНЫЙ ЭКРАН ЗАПУСКА */
        #appShell { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 10000; 
        }

        iframe { width: 100%; height: 100%; border: none; }

        .close-system { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 60px; background: rgba(255, 255, 255, 0.2); 
            border: 2px solid #fff; border-radius: 50%; color: #fff; 
            font-size: 20px; cursor: pointer; z-index: 10001; backdrop-filter: blur(5px);
        }
        
        .log { font-size: 10px; color: #555; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

    <h1>DENISIA BUILDER</h1>
    <div class="container">
        <label>ИМЯ ПРОЕКТА:</label>
        <input type="text" id="buildName" placeholder="Aliens_Defense">
        
        <label>ИСХОДНЫЙ КОД (HTML/CSS/JS):</label>
        <textarea id="buildCode" placeholder="<html>...</html>"></textarea>
        
        <button onclick="realBuild()">Собрать и скачать .apk</button>
        <div class="log">Файл будет сохранен как реальный пакет данных</div>
    </div>

    <div class="container installer-zone">
        <h1>DENISIA INSTALLER</h1>
        <label>ВЫБЕРИТЕ ПАКЕТ (.apk) ДЛЯ ОБРАБОТКИ:</label>
        <input type="file" id="apkInput" accept=".apk">
        
        <button style="background: #ff0055; color: #fff;" onclick="realInstall()">Установить и Запустить</button>
        <div id="installStatus" class="log" style="color: #ff0055;">Ожидание загрузки пакета...</div>
    </div>

    <div id="appShell">
        <iframe id="appView"></iframe>
        <button class="close-system" onclick="closeSystem()">✕</button>
    </div>

    <script>
        // --- ФУНКЦИЯ СБОРКИ ---
        function realBuild() {
            const name = document.getElementById('buildName').value || "App";
            const code = document.getElementById('buildCode').value;

            if(!code) { alert("ОШИБКА: Код пуст!"); return; }

            // Создаем Blob (двоичный объект), который содержит наш код
            // Тип указываем как Android Package, чтобы система видела его как APK
            const blob = new Blob([code], { type: "application/vnd.android.package-archive" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = name + ".apk";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- ФУНКЦИЯ УСТАНОВКИ И ОБРАБОТКИ ---
        function realInstall() {
            const fileInput = document.getElementById('apkInput');
            const status = document.getElementById('installStatus');
            
            if (fileInput.files.length === 0) {
                alert("Сначала выбери .apk файл!");
                return;
            }

            const file = fileInput.files[0];
            status.innerText = "ЧТЕНИЕ СТРУКТУРЫ ПАКЕТА...";

            const reader = new FileReader();
            
            reader.onload = function(e) {
                const rawContent = e.target.result;
                
                status.innerText = "ПРОВЕРКА ЦЕЛОСТНОСТИ... ОК";
                
                setTimeout(() => {
                    status.innerText = "УСТАНОВКА В СИСТЕМУ DENISIA...";
                    setTimeout(() => {
                        launchSystem(rawContent);
                        status.innerText = "ПРИЛОЖЕНИЕ ЗАПУЩЕНО";
                    }, 1000);
                }, 1000);
            };

            reader.onerror = () => alert("Ошибка чтения файла!");
            
            // Читаем файл как текст, чтобы вытащить исполняемый HTML код
            reader.readAsText(file);
        }

        // --- ЗАПУСК СИСТЕМЫ ---
        function launchSystem(code) {
            const shell = document.getElementById('appShell');
            const view = document.getElementById('appView');
            
            // Создаем временный URL для кода, чтобы iframe мог его запустить
            const blob = new Blob([code], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            
            view.src = url;
            shell.style.display = "block";
            
            // Фиксация экрана для игр
            document.body.style.overflow = "hidden";
        }

        function closeSystem() {
            const shell = document.getElementById('appShell');
            const view = document.getElementById('appView');
            
            if(confirm("Закрыть приложение и вернуться в DENISIA OS?")) {
                shell.style.display = "none";
                view.src = "about:blank";
                document.body.style.overflow = "auto";
            }
        }
    </script>
</body>
</html>
