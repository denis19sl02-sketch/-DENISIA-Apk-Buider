<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DENISIA APK BUILDER</title>
    <style>
        body { 
            background: #000; color: #00e5ff; 
            font-family: 'Arial Black', sans-serif; 
            display: flex; flex-direction: column; align-items: center; padding: 20px; 
        }
        .panel { 
            width: 95%; max-width: 550px; 
            background: rgba(0, 20, 40, 0.9); 
            border: 3px solid #00e5ff; padding: 25px; 
            border-radius: 25px; box-shadow: 0 0 30px #00e5ff; 
        }
        input, textarea { 
            width: 100%; background: #050505; border: 1px solid #00e5ff; 
            color: #fff; margin: 10px 0; padding: 15px; border-radius: 12px; 
            box-sizing: border-box; outline: none;
        }
        textarea { height: 200px; font-family: monospace; }
        button { 
            width: 100%; padding: 20px; background: #00e5ff; border: none; 
            color: #000; font-weight: bold; border-radius: 15px; 
            cursor: pointer; font-size: 22px; text-transform: uppercase; margin-top: 15px;
        }
        .icon-preview {
            width: 100px; height: 100px; border: 2px dashed #00e5ff;
            margin: 10px auto; border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>

    <h1>DENISIA BUILDER</h1>

    <div class="panel">
        <label>НАЗВАНИЕ ПРИЛОЖЕНИЯ:</label>
        <input type="text" id="appName" value="Aliens_Defense">

        <label>КОД ИГРЫ (HTML/JS):</label>
        <textarea id="appCode" placeholder="Вставь код сюда..."></textarea>

        <label>ВЫБЕРИ ИКОНКУ (ГАЛЕРЕЯ):</label>
        <input type="file" id="iconInput" accept="image/*" onchange="loadIcon(this)">
        <div id="preview" class="icon-preview">ICON</div>

        <button onclick="generateAPK()">СКАЧАТЬ АПК</button>
    </div>

    <script>
        let iconBase64 = "";

        // Функция предпросмотра иконки из галереи
        function loadIcon(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('preview').innerText = "";
                    iconBase64 = e.target.result; // Сохраняем данные иконки
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Функция реальной сборки и скачивания
        function generateAPK() {
            const name = document.getElementById('appName').value;
            const code = document.getElementById('appCode').value;

            if (!code) {
                alert("Ошибка: Код пуст!");
                return;
            }

            // Создаем содержимое файла (Код + метаданные иконки в комментарии для веса)
            const fileContent = `\n${code}`;
            
            // Создаем Blob с типом APK
            const blob = new Blob([fileContent], { type: "application/vnd.android.package-archive" });
            
            // Запуск системного скачивания
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = name + ".apk";
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            alert("ПАКЕТ " + name.toUpperCase() + " ОТПРАВЛЕН В ЗАГРУЗКИ!");
        }
    </script>

</body>
</html>
