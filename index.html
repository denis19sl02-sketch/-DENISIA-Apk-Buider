<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DENISIA OS: APK SYSTEM</title>
    
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkRFTklTSUEgT1MiLAogICJzaG9ydF9uYW1lIjogIkRFTklTSUEiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAwMDAwMCIsCiAgInRoZW1lX2NvbG9yIjogIiMwMGU1ZmYiLAogICJpY29ucyI6IFt7ICJzcmMiOiAiaHR0cHM6Ly92aWEucGxhY2Vob2xkZXIuY29tLzUxMiIsICJzaXplcyI6ICI1MTJ4NTEyIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiB9XQp9">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        /* ТВОЙ СТИЛЬ ИМПЕРИИ DENISIA */
        body { 
            margin: 0; 
            background: #000; 
            color: #00e5ff; 
            font-family: 'Arial Black', sans-serif; 
            overflow: hidden; 
            user-select: none;
        }

        .screen { 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s; 
        }

        .hidden { 
            transform: scale(0.8); 
            opacity: 0; 
            pointer-events: none; 
        }

        .panel { 
            background: rgba(0, 15, 30, 0.9); 
            border: 3px solid #00e5ff; 
            padding: 30px; 
            border-radius: 25px; 
            width: 85%; 
            max-width: 550px; 
            box-shadow: 0 0 40px rgba(0, 229, 255, 0.3); 
            text-align: center;
        }

        h1 { 
            font-size: 35px; 
            text-shadow: 0 0 20px #00e5ff; 
            margin-bottom: 25px; 
            letter-spacing: 5px;
        }

        input, textarea { 
            width: 100%; 
            background: #050505; 
            border: 1px solid #00e5ff; 
            color: #fff; 
            margin: 12px 0; 
            padding: 15px; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-family: monospace;
            outline: none;
        }

        textarea { height: 180px; resize: none; }

        button { 
            width: 100%; 
            padding: 18px; 
            background: #00e5ff; 
            border: none; 
            color: #000; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            font-size: 20px; 
            margin: 15px 0; 
            text-transform: uppercase; 
            transition: 0.3s;
        }

        button:hover { 
            box-shadow: 0 0 30px #00e5ff; 
            transform: translateY(-2px); 
        }

        .loader-ring { 
            width: 60px; 
            height: 60px; 
            border: 6px solid #111; 
            border-top-color: #00e5ff; 
            border-radius: 50%; 
            animation: spin 1s infinite linear; 
            margin: 20px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #gameContainer { width: 100%; height: 100%; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }

        .icon-preview {
            width: 80px; height: 80px;
            border: 2px dashed #00e5ff;
            border-radius: 15px; margin: 10px auto;
            display: flex; align-items: center; justify-content: center;
            background-size: cover; background-position: center;
        }
    </style>
</head>
<body>

    <div id="buildScreen" class="screen">
        <h1>APK BUILDER</h1>
        <div class="panel">
            <input type="text" id="appName" placeholder="ИМЯ ПРИЛОЖЕНИЯ">
            <textarea id="appCode" placeholder="ВСТАВЬ HTML/JS КОД ИГРЫ..."></textarea>
            
            <label style="font-size: 12px; display: block; margin-top: 5px;">ВЫБЕРИ ИКОНКУ:</label>
            <input type="file" id="iconInput" accept="image/*" onchange="previewIcon(this)">
            <div id="iconBox" class="icon-preview">?</div>

            <button onclick="startProcessing()">СОБРАТЬ И УСТАНОВИТЬ</button>
        </div>
    </div>

    <div id="installScreen" class="screen hidden">
        <h1 id="statusTitle">АНАЛИЗ...</h1>
        <div class="panel">
            <div id="finalIcon" class="icon-preview" style="border-style: solid; width: 100px; height: 100px;"></div>
            <div id="loader" class="loader-ring"></div>
            <p id="statusText">ПОДГОТОВКА ПАКЕТА DENISIA...</p>
            <button id="launchBtn" class="hidden" onclick="runApp()">ЗАПУСТИТЬ</button>
        </div>
    </div>

    <div id="appScreen" class="screen hidden" style="justify-content: flex-start;">
        <div id="gameContainer">
            <iframe id="appFrame"></iframe>
        </div>
        <button onclick="exitSystem()" style="position: absolute; bottom: 10px; width: 60px; height: 60px; border-radius: 50%; font-size: 12px; opacity: 0.6; padding: 0;">X</button>
    </div>

    <script>
        // АВТО-РЕГИСТРАЦИЯ ДЛЯ УСТАНОВЩИКА
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdmZXRjaCcsIGV2ID0+IGV2LnJlc3BvbmRXaXRoKGZldGNoKGV2LnJlcXVlc3QpKSk7');
        }

        let appData = { name: "", code: "", icon: "" };

        function previewIcon(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('iconBox').style.backgroundImage = `url(${e.target.result})`;
                    document.getElementById('iconBox').innerText = "";
                    appData.icon = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function startProcessing() {
            appData.name = document.getElementById('appName').value || "Unnamed App";
            appData.code = document.getElementById('appCode').value;
            if (!appData.code) return alert("ОШИБКА: НЕТ КОДА!");
            document.getElementById('buildScreen').classList.add('hidden');
            document.getElementById('installScreen').classList.remove('hidden');
            if(appData.icon) document.getElementById('finalIcon').style.backgroundImage = `url(${appData.icon})`;
            simulateInstallation();
        }

        function simulateInstallation() {
            const status = document.getElementById('statusText');
            const title = document.getElementById('statusTitle');
            setTimeout(() => {
                status.innerText = "ПРОВЕРКА СИГНАТУР...";
                setTimeout(() => {
                    status.innerText = "РАСПАКОВКА РЕСУРСОВ...";
                    setTimeout(() => {
                        status.innerText = "УСТАНОВКА ЗАВЕРШЕНА";
                        title.innerText = appData.name.toUpperCase();
                        document.getElementById('loader').classList.add('hidden');
                        document.getElementById('launchBtn').classList.remove('hidden');
                    }, 1200);
                }, 1200);
            }, 800);
        }

        function runApp() {
            const frame = document.getElementById('appFrame');
            const blob = new Blob([appData.code], {type: 'text/html'});
            frame.src = URL.createObjectURL(blob);
            document.getElementById('installScreen').classList.add('hidden');
            document.getElementById('appScreen').classList.remove('hidden');
        }

        function exitSystem() {
            if(confirm("ВЫЙТИ В ГЛАВНОЕ МЕНЮ?")) location.reload();
        }
    </script>
</body>
</html>
